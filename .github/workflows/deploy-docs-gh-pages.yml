# Déploie uniquement le dossier docs/ sur GitHub Pages via Actions (sparse checkout).
# Évite le clone des sous-modules (repos privés ou introuvables pour le runner anonyme).
#
# Après merge : GitHub → Settings → Pages → Source : « GitHub Actions » (pas « Deploy from branch »).

name: Deploy GitHub Pages (docs only)

on:
  workflow_dispatch:
  push:
    branches:
      - "1.06"
      - "1.07"
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs-gh-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sparse (docs uniquement — pas de sous-modules)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          sparse-checkout: |
            docs
          sparse-checkout-cone-mode: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
