# Publie le dossier docs/ sur la branche gh-pages pour GitHub Pages (sans Vercel).
# Après le 1er run : Settings → Pages → Source = branch gh-pages / folder / (root).
name: Deploy docs to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - "1.06"
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs-gh-pages.yml"

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy docs → gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
          commit-message: "chore(pages): deploy docs from ${{ github.sha }}"
