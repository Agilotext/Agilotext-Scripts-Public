<!--
  Webflow : Embed sous Transcriptions, après Memberstack / getToken.
  Div #agilo-nav-folders-root : ajouter les Custom attributes dans Webflow (Settings).
-->

<div
  id="agilo-nav-folders-root"
  hidden
  data-agilo-folders-start="auto"
  data-link-class="dashboard-link w-inline-block"
  data-summary-class="dashboard-link w-inline-block"
  data-row-structure="match-nav"
  data-agilo-folder-palette="--color--blue,--color--orange,--color--vert,--color--rouge"
></div>

<script src="https://cdn.jsdelivr.net/gh/Agilotext/Agilotext-Scripts-Public@1.05/scripts/pages/dashboard/Code-sidebar-folders-css.js"></script>
