<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  AGILOTEXT — Zone d'envoi chat (Embed Webflow)                  ║
  ║  Version : 1.08 — barre inline unique (no footer séparé)        ║
  ║                                                                  ║
  ║  Instructions :                                                  ║
  ║  1. Dans Webflow, supprimer wrapper-chat-submission              ║
  ║  2. Ajouter un élément "Embed" à sa place (sans div #chat-      ║
  ║     compose-bar autour — risque de double barre)                 ║
  ║  3. Copier-coller tout ce fichier dans l'embed                   ║
  ║  4. Publier + purger cache jsDelivr                              ║
  ║                                                                  ║
  ║  Contrat DOM (attendu par Code-chat_V05.js) :                    ║
  ║    #wf-form-chat   → form                                        ║
  ║    #chatPrompt     → textarea                                    ║
  ║    #chat-compose-bar   → flex-row unique                         ║
  ║    #chat-attach-btn  → bouton PJ (gauche)                        ║
  ║    #chat-send-btn  → bouton Envoyer (droite)                     ║
  ║    #chat-dictate-btn   → injecté par JS entre textarea + send    ║
  ║    #chat-queue-badge   → badge file d'attente (JS)               ║
  ║    #chat-attachments-list → liste PJ phase 2 (JS)               ║
  ╚══════════════════════════════════════════════════════════════════╝
-->

<style>
/* ── Conteneur principal ─────────────────────────────────────────── */
#agilo-chat-submission {
  display: flex;
  flex-direction: column;
  width: 100%;
  box-sizing: border-box;
  position: relative;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  border: 1px solid var(--agilo-border, #cbd5e1);
  border-radius: .75rem;
  background: var(--agilo-surface, #ffffff);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  overflow: hidden;
  transition: box-shadow .15s, border-color .15s;
}
#agilo-chat-submission:focus-within {
  border-color: color-mix(in srgb, var(--agilo-primary, #174a96) 45%, transparent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--agilo-primary, #174a96) 12%, transparent);
}
#agilo-chat-submission form {
  margin: 0;
  padding: 0;
}

/* ── Barre unique : [📎] [textarea] [mic] [➤] ────────────────────── */
#agilo-chat-submission #chat-compose-bar {
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  gap: .2rem;
  padding: .4rem .45rem;
  width: 100%;
  box-sizing: border-box;
  /* Supprimer tout style parasite venu du Webflow parent */
  border: none;
  box-shadow: none;
  background: transparent;
  border-radius: 0;
}

/* ── Textarea ─────────────────────────────────────────────────────── */
#agilo-chat-submission #chatPrompt {
  flex: 1 1 0;
  min-width: 0;
  border: none;
  outline: none;
  box-shadow: none;
  resize: none;
  background: transparent;
  min-height: 36px;
  max-height: 180px;
  padding: .45rem .3rem;
  font-size: .9375rem;
  line-height: 1.5;
  color: var(--agilo-text, #020202);
  font-family: inherit;
  align-self: center;
  overflow-y: auto;
}
#agilo-chat-submission #chatPrompt::placeholder {
  color: var(--agilo-dim, #9ca3af);
}

/* ── Boutons icon-only ────────────────────────────────────────────── */
#agilo-chat-submission #chat-attach-btn,
#agilo-chat-submission #chat-dictate-btn,
#agilo-chat-submission #chat-send-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  width: 2rem;
  height: 2rem;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--agilo-dim, #6b7280);
  padding: 0;
  font-size: 0;
  transition: background .14s, color .14s, opacity .14s;
  box-sizing: border-box;
}

/* PJ : gauche, légèrement atténué */
#agilo-chat-submission #chat-attach-btn {
  opacity: .5;
}
#agilo-chat-submission #chat-attach-btn:hover {
  background: color-mix(in srgb, var(--agilo-text, #0b1222) 7%, transparent);
  opacity: .8;
}

/* Mic */
#agilo-chat-submission #chat-dictate-btn:hover {
  background: color-mix(in srgb, var(--agilo-text, #0b1222) 7%, transparent);
  color: var(--agilo-text, #020202);
}
#agilo-chat-submission #chat-dictate-btn.is-recording {
  color: #ef4444;
  animation: agilo-mic-pulse 1.2s ease-in-out infinite;
}
@keyframes agilo-mic-pulse {
  0%, 100% { background: transparent; }
  50%       { background: rgba(239,68,68,.12); }
}

/* Envoyer */
#agilo-chat-submission #chat-send-btn {
  color: var(--agilo-primary, #174a96);
}
#agilo-chat-submission #chat-send-btn:hover {
  background: color-mix(in srgb, var(--agilo-primary, #174a96) 10%, transparent);
}
#agilo-chat-submission #chat-send-btn.is-busy {
  opacity: .4;
  pointer-events: none;
}
#agilo-chat-submission #chat-send-btn:focus-visible,
#agilo-chat-submission #chat-attach-btn:focus-visible {
  outline: 2px solid color-mix(in srgb, var(--agilo-primary, #174a96) 60%, transparent);
  outline-offset: 2px;
}

/* ── Badge file d'attente ─────────────────────────────────────────── */
#agilo-chat-submission #chat-queue-badge[hidden],
#agilo-chat-submission #chat-queue-badge:empty {
  display: none !important;
}
#agilo-chat-submission #chat-queue-badge:not([hidden]) {
  position: absolute;
  top: .3rem;
  right: 2.6rem;
  z-index: 2;
  display: inline-block;
  padding: 1px 6px;
  border-radius: 6px;
  background: #fef3c7;
  color: #92400e;
  font-size: .68rem;
  font-weight: 600;
  line-height: 1.3;
  pointer-events: none;
}

/* ── Liste PJ (phase 2) ───────────────────────────────────────────── */
#agilo-chat-submission #chat-attachments-list:not(:empty) {
  padding: .25rem .5rem .4rem;
  border-top: 1px solid color-mix(in srgb, var(--agilo-border, #cbd5e1) 55%, transparent);
}

/* ── Masquer ancien div Webflow #btnAsk ───────────────────────────── */
#agilo-chat-submission #btnAsk,
#btnAsk[hidden] { display: none !important; }

/* ── Neutraliser la div Webflow parente qui reprendrait un style ──── */
.w-embed:has(#agilo-chat-submission),
.w-richtext:has(#agilo-chat-submission) {
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
  background: transparent !important;
}

/* ── Responsive ───────────────────────────────────────────────────── */
@media (max-width: 40rem) {
  #agilo-chat-submission { border-radius: .55rem; }
  #agilo-chat-submission #chat-compose-bar { padding: .3rem .35rem; }
  #agilo-chat-submission #chatPrompt { font-size: .9rem; padding: .35rem .2rem; }
}
@media (prefers-reduced-motion: reduce) {
  #agilo-chat-submission * { animation: none !important; transition: none !important; }
}
</style>

<div id="agilo-chat-submission">
  <form id="wf-form-chat" action="#" onsubmit="return false;" novalidate aria-label="Envoyer un message à l'IA">
    <div id="chat-compose-bar">

      <!-- Bouton PJ (gauche) -->
      <button
        type="button"
        id="chat-attach-btn"
        aria-label="Pièce jointe — bientôt disponible"
        title="Pièces jointes — bientôt disponibles"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>

      <!-- Textarea centre -->
      <textarea
        id="chatPrompt"
        name="chatPrompt"
        class="input-chat"
        rows="1"
        placeholder="Posez votre question…"
        lang="fr"
        autocomplete="off"
        spellcheck="true"
        aria-label="Message à l'IA"
      ></textarea>

      <!-- Mic injecté par JS ici (avant le bouton Envoyer) -->

      <!-- Bouton Envoyer (droite) -->
      <button
        type="button"
        id="chat-send-btn"
        class="agilo-chat-send"
        aria-label="Envoyer"
        title="Envoyer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>

    </div>
  </form>

  <!-- Liste pièces jointes (remplie par JS en phase 2) -->
  <div id="chat-attachments-list"></div>
</div>
