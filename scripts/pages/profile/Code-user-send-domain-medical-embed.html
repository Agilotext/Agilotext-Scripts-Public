<!--
  Webflow — « domainRecognition » (général / médical). Coller tout le bloc dans un Embed.

  Structure recommandée (comme les notifications mail) :
  1. Cet embed (CSS + radios + ligne de statut).
  2. En dessous : bloc Webflow « wrapper-button » + bouton Align left, comme #save-mailNotif :
       - Type : button
       - ID : agilo-medical-save-btn
       - Classes : les mêmes que #save-mailNotif (ex. button save w-button …)

  Titre / sous-titre : à gérer dans Webflow hors embed (H2 existant).
-->
<style>
  #agilo-medical-domain-root {
    --agt-text: var(--color--gris_foncé, #020202);
    --agt-muted: var(--color--Gris, #525252);
    --agt-accent: var(--color--orange, #fd7e14);
    --agt-accent-weak: rgba(253, 126, 20, 0.14);
    --agt-success: var(--color--vert, #1c661a);
    --agt-danger: var(--color--rouge, #a82633);
    --agt-font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    display: block;
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: var(--agt-font);
    color: var(--agt-text);
    text-align: left;
  }

  #agilo-medical-domain-root .agt-med-radio-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    margin: 0;
    padding: 0;
  }

  #agilo-medical-domain-root .agt-med-radio {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    margin: 0;
    border: none;
    border-radius: 0;
    box-shadow: none;
    background: transparent;
    cursor: pointer;
    transition: opacity 0.15s ease;
    text-align: left;
  }

  #agilo-medical-domain-root .agt-med-radio:hover {
    opacity: 0.92;
  }

  #agilo-medical-domain-root .agt-med-radio input[type="radio"] {
    margin-top: 3px;
    width: 18px;
    height: 18px;
    flex: 0 0 auto;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    border: 2px solid var(--color--Noir_25, rgba(52, 58, 64, 0.28));
    border-radius: 50%;
    background: var(--color--white, #fff);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  #agilo-medical-domain-root .agt-med-radio input[type="radio"]:checked {
    border-color: var(--agt-accent);
    background-image: radial-gradient(circle, var(--agt-accent) 40%, transparent 40%);
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
  }

  #agilo-medical-domain-root .agt-med-radio:has(input[type="radio"]:checked) {
    background: transparent;
  }

  #agilo-medical-domain-root .agt-med-radio-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  #agilo-medical-domain-root .agt-med-radio-main {
    font-weight: 700;
    font-size: 14.5px;
    line-height: 1.25;
  }

  #agilo-medical-domain-root .agt-med-radio-desc {
    font-size: 13px;
    color: var(--agt-muted);
    line-height: 1.35;
  }

  #agilo-medical-domain-root .agt-med-reco {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: 8px;
    font-weight: 700;
    font-size: 11px;
    color: var(--color--gris_foncé, #020202);
    background: var(--agt-accent-weak);
    border: none;
    padding: 3px 8px;
    border-radius: 999px;
    vertical-align: middle;
  }

  #agilo-medical-domain-root .agt-med-status-row {
    margin-top: 10px;
    width: 100%;
    text-align: left;
  }

  #agilo-medical-domain-root #agilo-medical-domain-status {
    font-size: 12.5px;
    color: var(--agt-muted);
    min-height: 18px;
    margin: 0;
    padding: 0;
  }

  #agilo-medical-domain-root #agilo-medical-domain-status.ok {
    color: var(--agt-success);
    font-weight: 700;
  }

  #agilo-medical-domain-root #agilo-medical-domain-status.err {
    color: var(--agt-danger);
    font-weight: 700;
  }
</style>

<div id="agilo-medical-domain-root" class="agilo-medical-embed">
  <div
    class="agt-med-radio-group"
    role="radiogroup"
    aria-label="Domaine de transcription"
  >
    <label class="agt-med-radio">
      <input type="radio" name="agiloDomainRecognition" value="general" checked />
      <span class="agt-med-radio-text">
        <span class="agt-med-radio-main">Général</span>
        <span class="agt-med-radio-desc">Transcription standard.</span>
      </span>
    </label>

    <label class="agt-med-radio">
      <input type="radio" name="agiloDomainRecognition" value="medical" />
      <span class="agt-med-radio-text">
        <span class="agt-med-radio-main">
          Mode médical
          <span class="agt-med-reco">Lexique médical</span>
        </span>
        <span class="agt-med-radio-desc">Vocabulaire et formulations médicales prioritaires.</span>
      </span>
    </label>
  </div>

  <div class="agt-med-status-row">
    <p id="agilo-medical-domain-status" role="status" aria-live="polite"></p>
  </div>
</div>
